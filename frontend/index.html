<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23fff'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Sonus</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; width: 100%; overflow: hidden; background: #000; }

      #sonus-splash {
        position: fixed; inset: 0; z-index: 999999;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        background: #000;
        opacity: 1;
        transition: opacity 900ms cubic-bezier(.22, 1, .36, 1), transform 900ms cubic-bezier(.22, 1, .36, 1);
        cursor: default;
        user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
      }
      #sonus-splash.exiting {
        opacity: 0;
        transform: scale(1.04);
        pointer-events: none;
      }
      #sonus-splash.removed { display: none; }

      #splash-canvas {
        position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0;
      }

      .splash-vignette {
        position: absolute; inset: 0; z-index: 1; pointer-events: none;
        background:
          radial-gradient(ellipse at 50% 45%, transparent 0%, rgba(0,0,0,.55) 75%, rgba(0,0,0,.85) 100%),
          linear-gradient(180deg, rgba(0,0,0,.35) 0%, transparent 35%, transparent 65%, rgba(0,0,0,.55) 100%),
          linear-gradient(90deg, rgba(0,0,0,.42) 0%, transparent 18%, transparent 82%, rgba(0,0,0,.42) 100%);
      }

      .splash-noise {
        position: absolute; inset: 0; z-index: 2; pointer-events: none; opacity: .038; mix-blend-mode: screen;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E");
        background-size: 180px 180px;
      }

      .splash-content {
        position: relative; z-index: 10;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        pointer-events: none;
        transition: opacity 800ms cubic-bezier(.22, 1, .36, 1), transform 900ms cubic-bezier(.22, 1, .36, 1);
      }

      .splash-wordmark {
        position: relative;
        font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-size: clamp(64px, 16vw, 168px);
        font-weight: 820;
        letter-spacing: .18em;
        color: #fff;
        text-transform: uppercase;
        text-shadow:
          0 0 40px rgba(0, 245, 212, .28),
          0 0 84px rgba(36, 66, 255, .18),
          0 18px 60px rgba(0,0,0,.55);
        opacity: 0;
        transform: translateY(18px) scale(.96);
        clip-path: inset(46% 0 48% 0);
        animation: splashWordIn 1600ms cubic-bezier(.22, 1, .36, 1) forwards;
        will-change: opacity, transform, clip-path, letter-spacing;
      }

      .splash-wordmark .char {
        display: inline-block;
        will-change: transform, opacity;
      }

      .splash-signal-line {
        width: min(420px, 58vw); height: 2px; margin-top: 28px;
        background: linear-gradient(90deg, transparent, rgba(0,245,212,.55), rgba(244,210,138,.85), rgba(36,66,255,.45), transparent);
        box-shadow: 0 0 24px rgba(0,245,212,.24), 0 0 48px rgba(244,210,138,.14);
        opacity: 0; transform: scaleX(.08);
        animation: splashSignalLine 1200ms cubic-bezier(.22, 1, .36, 1) 420ms forwards;
      }

      .splash-subtitle {
        margin-top: 18px;
        font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-size: 11px; font-weight: 650; letter-spacing: .26em;
        color: rgba(255,255,255,.38); text-transform: uppercase;
        opacity: 0; transform: translateY(10px);
        animation: splashSubIn 900ms cubic-bezier(.22, 1, .36, 1) 900ms forwards;
      }

      /* 动画第二阶段：品牌名缩小为入口胶囊 */
      #sonus-splash.ready .splash-content {
        transform: translateY(0) scale(1);
      }
      #sonus-splash.ready .splash-wordmark {
        font-size: clamp(22px, 5.2vw, 42px);
        letter-spacing: .32em;
        padding: 14px 30px;
        border-radius: 999px;
        background: rgba(255,255,255,.06);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border: 1px solid rgba(255,255,255,.14);
        box-shadow:
          0 24px 70px rgba(0,0,0,.42),
          inset 0 1px 0 rgba(255,255,255,.16),
          0 0 30px rgba(0,245,212,.10);
        cursor: pointer;
        animation: splashWordToEntry 900ms cubic-bezier(.22, 1, .36, 1) forwards;
      }
      #sonus-splash.ready .splash-wordmark:hover {
        background: rgba(255,255,255,.10);
        border-color: rgba(0,245,212,.42);
        box-shadow:
          0 28px 80px rgba(0,0,0,.48),
          inset 0 1px 0 rgba(255,255,255,.20),
          0 0 40px rgba(0,245,212,.18);
      }
      #sonus-splash.ready .splash-signal-line,
      #sonus-splash.ready .splash-subtitle {
        opacity: 0;
        transform: translateY(-8px) scale(.96);
        animation: none;
        transition: opacity 500ms ease, transform 500ms ease;
      }

      .splash-enter-hint {
        position: absolute; bottom: 8vh; left: 50%; transform: translateX(-50%);
        z-index: 10; pointer-events: none;
        font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-size: 10px; font-weight: 600; letter-spacing: .24em;
        color: rgba(255,255,255,.42); text-transform: uppercase;
        text-shadow: 0 0 18px rgba(0,245,212,.18);
        opacity: 0; transform: translateY(12px);
        transition: opacity 700ms cubic-bezier(.22, 1, .36, 1), transform 700ms cubic-bezier(.22, 1, .36, 1);
      }
      #sonus-splash.ready .splash-enter-hint {
        opacity: 1; transform: translateY(0);
        animation: enterHintPulse 2200ms ease-in-out infinite alternate;
      }

      @keyframes splashWordIn {
        0% { opacity: 0; transform: translateY(18px) scale(.96); clip-path: inset(46% 0 48% 0); letter-spacing: .28em; }
        60% { opacity: 1; transform: translateY(0) scale(1); clip-path: inset(0); letter-spacing: .18em; }
        100% { opacity: 1; transform: translateY(0) scale(1); clip-path: inset(0); letter-spacing: .18em; }
      }
      @keyframes splashSignalLine {
        0% { opacity: 0; transform: scaleX(.08); }
        40% { opacity: 1; transform: scaleX(1.06); }
        70% { opacity: .72; transform: scaleX(.92); }
        100% { opacity: .45; transform: scaleX(.72); }
      }
      @keyframes splashSubIn {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes splashWordToEntry {
        0% { opacity: 1; clip-path: inset(0); }
        100% { opacity: 1; clip-path: inset(0); }
      }
      @keyframes enterHintPulse {
        0% { opacity: .34; text-shadow: 0 0 12px rgba(0,245,212,.10); }
        100% { opacity: .72; text-shadow: 0 0 24px rgba(0,245,212,.28); }
      }

      @media (prefers-reduced-motion: reduce) {
        .splash-wordmark, .splash-signal-line, .splash-subtitle { animation-duration: .001ms !important; animation-fill-mode: forwards !important; }
        .splash-wordmark { opacity: 1; transform: none; clip-path: inset(0); }
        .splash-signal-line { opacity: .45; transform: scaleX(.72); }
        .splash-subtitle { opacity: 1; transform: none; }
      }
    </style>
  </head>
  <body>
    <div id="sonus-splash" aria-label="Sonus 启动页">
      <canvas id="splash-canvas"></canvas>
      <div class="splash-vignette"></div>
      <div class="splash-noise"></div>
      <div class="splash-content">
        <div class="splash-wordmark" id="splash-wordmark">SONUS</div>
        <div class="splash-signal-line"></div>
        <div class="splash-subtitle">immersive music visualization</div>
      </div>
      <div class="splash-enter-hint">点击任意处进入</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function() {
        var splash = document.getElementById('sonus-splash');
        var canvas = document.getElementById('splash-canvas');
        var ctx = canvas.getContext('2d');
        var wordmark = document.getElementById('splash-wordmark');
        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        var W, H, cx, cy;
        var startedAt = performance.now();
        var animating = true;
        var readyToEnter = false;
        var exiting = false;
        var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        var particles = [];
        var streaks = [];
        var shards = [];
        var bursts = [];

        var ACCENT = '#00F5D4';
        var WARM = '#f4d28a';
        var BLUE = '#2442ff';
        var colors = [ACCENT, WARM, BLUE, '#ffffff'];

        function hexToRgba(hex, a) {
          var c = hex.replace('#', '');
          var n = parseInt(c.length === 3 ? c.split('').map(function(x){ return x+x; }).join('') : c, 16);
          return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
        }

        function resize() {
          W = window.innerWidth; H = window.innerHeight;
          canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
          canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          cx = W / 2; cy = H / 2;
          initScene();
        }

        function initScene() {
          particles = []; streaks = []; shards = []; bursts = [];
          var pCount = reduceMotion ? 40 : 120;
          for (var i = 0; i < pCount; i++) {
            particles.push({
              x: Math.random() * W, y: Math.random() * H,
              vx: (Math.random() - .5) * .22, vy: (Math.random() - .5) * .16,
              r: Math.random() * 1.6 + .25,
              a: Math.random() * .12 + .04,
              color: colors[i % colors.length],
              phase: Math.random() * Math.PI * 2
            });
          }
          var sCount = reduceMotion ? 6 : 18;
          for (var k = 0; k < sCount; k++) {
            streaks.push({
              x: Math.random() * W,
              y: H * (.18 + Math.random() * .64),
              len: W * (.1 + Math.random() * .32),
              width: .6 + Math.random() * 2.2,
              speed: W * (.0002 + Math.random() * .00035),
              angle: (-12 + Math.random() * 24) * Math.PI / 180,
              color: colors[k % colors.length],
              alpha: .12 + Math.random() * .32,
              delay: Math.random() * 1.2,
              phase: Math.random() * Math.PI * 2
            });
          }
          var hCount = reduceMotion ? 8 : 28;
          for (var h = 0; h < hCount; h++) {
            shards.push({
              ox: (Math.random() - .5) * W * .85,
              oy: (Math.random() - .5) * H * .22,
              w: 16 + Math.random() * 80,
              h: 1 + Math.random() * 4.5,
              skew: (Math.random() - .5) * 24,
              color: colors[h % colors.length],
              alpha: .08 + Math.random() * .22,
              phase: Math.random() * Math.PI * 2
            });
          }
        }

        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
        function ease(t) { t = clamp(t, 0, 1); return t * t * (3 - 2 * t); }
        function easeOutCubic(t) { t = clamp(t, 0, 1); return 1 - Math.pow(1 - t, 3); }

        function drawBackground(t) {
          var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * .8);
          g.addColorStop(0, 'rgba(2, 10, 12, .92)');
          g.addColorStop(.45, 'rgba(3, 5, 8, .96)');
          g.addColorStop(1, 'rgba(0, 0, 0, 1)');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, W, H);

          // center aura
          var auraIn = easeOutCubic(clamp(t / 1.1, 0, 1));
          var pulse = 1 + .06 * Math.sin(t * 1.6);
          var r = Math.min(W, H) * (.28 + .14 * auraIn) * pulse;
          var aura = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          aura.addColorStop(0, hexToRgba(ACCENT, .10 * auraIn));
          aura.addColorStop(.35, hexToRgba(BLUE, .045 * auraIn));
          aura.addColorStop(.7, hexToRgba(WARM, .018 * auraIn));
          aura.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = aura;
          ctx.fillRect(0, 0, W, H);
        }

        function drawScanlines(t) {
          ctx.save();
          ctx.globalAlpha = .16;
          ctx.fillStyle = 'rgba(255,255,255,.025)';
          var off = (t * 28) % 34;
          for (var y = -off; y < H; y += 34) ctx.fillRect(0, y, W, 1);
          ctx.restore();
        }

        function drawParticles(t) {
          ctx.save();
          for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.phase += .02;
            if (p.x < -12) p.x = W + 12;
            if (p.x > W + 12) p.x = -12;
            if (p.y < -12) p.y = H + 12;
            if (p.y > H + 12) p.y = -12;
            var a = p.a * (.55 + .45 * Math.sin(p.phase + t * .8));
            ctx.globalAlpha = Math.max(0, a);
            ctx.fillStyle = hexToRgba(p.color, 1);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }

        function drawSignalLine(t) {
          var lineT = easeOutCubic(clamp((t - .18) / 1.0, 0, 1));
          var exitFade = 1 - ease(clamp((t - 3.2) / .9, 0, 1));
          if (lineT <= 0 || exitFade <= 0) return;
          var centerY = cy + Math.sin(t * 1.3) * 2;
          var slitW = W * (.12 + lineT * .68);
          var left = cx - slitW * .5, right = cx + slitW * .5;
          var coreAlpha = (.28 + lineT * .56) * exitFade;
          var sg = ctx.createLinearGradient(left, centerY, right, centerY);
          sg.addColorStop(0, 'rgba(0,245,212,0)');
          sg.addColorStop(.20, hexToRgba(ACCENT, .22 * exitFade));
          sg.addColorStop(.50, 'rgba(255,255,255,' + coreAlpha.toFixed(3) + ')');
          sg.addColorStop(.72, hexToRgba(WARM, .34 * exitFade));
          sg.addColorStop(1, 'rgba(36,66,255,0)');
          ctx.save();
          ctx.shadowColor = hexToRgba(WARM, .44 * exitFade);
          ctx.shadowBlur = 32 + lineT * 36;
          ctx.lineCap = 'round';
          ctx.strokeStyle = sg;
          ctx.lineWidth = 1.2 + lineT * 2.4;
          ctx.beginPath();
          ctx.moveTo(left, centerY);
          ctx.lineTo(right, centerY);
          ctx.stroke();
          ctx.restore();

          // wave
          var waveAlpha = ease(clamp((t - .7) / 1.2, 0, 1)) * exitFade;
          if (waveAlpha > 0) {
            ctx.save();
            ctx.shadowBlur = 18;
            ctx.strokeStyle = hexToRgba(WARM, .24 * waveAlpha);
            ctx.lineWidth = 1;
            ctx.beginPath();
            var steps = 80;
            for (var i = 0; i <= steps; i++) {
              var u = i / steps;
              var x = left + slitW * u;
              var edge = 1 - Math.abs(u - .5) * 2;
              var amp = (3 + 16 * lineT) * Math.pow(Math.max(0, edge), 1.3) * waveAlpha;
              var y = centerY + Math.sin(u * 30 + t * 7.2) * amp + Math.sin(u * 74 - t * 4.4) * amp * .18;
              if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.restore();
          }
        }

        function drawStreaks(t) {
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          for (var k = 0; k < streaks.length; k++) {
            var st = streaks[k];
            var fade = ease(clamp((t - st.delay * .6) / .8, 0, 1)) * (1 - ease(clamp((t - 3.6) / .9, 0, 1)));
            if (fade <= 0) continue;
            var travel = (t * st.speed * 240 + st.x + Math.sin(t * .7 + st.phase) * 26) % (W + st.len + 160);
            var px = travel - st.len - 80;
            var py = st.y + Math.sin(t * .65 + st.phase) * 16;
            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(st.angle);
            var g = ctx.createLinearGradient(-st.len * .5, 0, st.len * .5, 0);
            g.addColorStop(0, hexToRgba(st.color, 0));
            g.addColorStop(.5, hexToRgba(st.color, st.alpha * fade));
            g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.strokeStyle = g;
            ctx.lineWidth = st.width;
            ctx.shadowColor = hexToRgba(st.color, .36 * fade);
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.moveTo(-st.len * .5, 0);
            ctx.lineTo(st.len * .5, 0);
            ctx.stroke();
            ctx.restore();
          }
          ctx.restore();
        }

        function drawShards(t) {
          var shardT = ease(clamp((t - .55) / 1.4, 0, 1)) * (1 - ease(clamp((t - 3.8) / .8, 0, 1)));
          if (shardT <= 0) return;
          var centerY = cy + Math.sin(t * 1.3) * 2;
          ctx.save();
          ctx.globalCompositeOperation = 'lighter';
          for (var i = 0; i < shards.length; i++) {
            var sh = shards[i];
            var drift = Math.sin(t * 1.5 + sh.phase) * 18;
            var sx = cx + sh.ox * (.16 + shardT * .84) + drift;
            var sy = centerY + sh.oy * (.18 + shardT * .88);
            var a = sh.alpha * shardT * (.6 + .4 * Math.sin(t * 4 + sh.phase));
            if (a <= 0) continue;
            ctx.save();
            ctx.translate(sx, sy);
            ctx.rotate((-5 + sh.skew * .1) * Math.PI / 180);
            ctx.fillStyle = hexToRgba(sh.color, Math.max(0, a));
            ctx.shadowColor = hexToRgba(sh.color, Math.min(.4, a * 1.3));
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(-sh.w * .5, -sh.h * .5);
            ctx.lineTo(sh.w * .5, -sh.h * .5);
            ctx.lineTo(sh.w * .5 + sh.skew, sh.h * .5);
            ctx.lineTo(-sh.w * .5 + sh.skew, sh.h * .5);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
          ctx.restore();
        }

        function drawBurst(t) {
          var flash = Math.exp(-Math.pow((t - 2.1) / .42, 2));
          if (flash <= .015) return;
          var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * .55);
          g.addColorStop(0, 'rgba(255,255,255,' + (.14 * flash).toFixed(3) + ')');
          g.addColorStop(.35, hexToRgba(WARM, .08 * flash));
          g.addColorStop(.75, hexToRgba(ACCENT, .03 * flash));
          g.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = g;
          ctx.fillRect(0, 0, W, H);
        }

        function drawFrame() {
          if (!animating) return;
          requestAnimationFrame(drawFrame);
          var t = (performance.now() - startedAt) / 1000;
          ctx.clearRect(0, 0, W, H);
          drawBackground(t);
          drawParticles(t);
          drawStreaks(t);
          drawSignalLine(t);
          drawShards(t);
          drawBurst(t);
          drawScanlines(t);
        }

        function markReady() {
          if (exiting) return;
          readyToEnter = true;
          splash.classList.add('ready');
          splash.setAttribute('role', 'button');
          splash.setAttribute('tabindex', '0');
          splash.style.cursor = 'pointer';
        }

        function dismissSplash() {
          if (exiting || !readyToEnter) return;
          exiting = true;
          splash.classList.add('exiting');
          animating = false;
          setTimeout(function() {
            splash.classList.add('removed');
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 950);
        }

        window.__hideSonusSplash = dismissSplash;

        window.addEventListener('DOMContentLoaded', function() {
          resize();
          window.addEventListener('resize', resize);
          drawFrame();

          splash.addEventListener('click', function() {
            if (readyToEnter) dismissSplash();
          });
          splash.addEventListener('keydown', function(e) {
            if (!readyToEnter) return;
            if (e.key === 'Enter' || e.code === 'Space') {
              e.preventDefault();
              dismissSplash();
            }
          });

          // 给品牌文字分字符添加微小波动
          var text = wordmark.textContent;
          wordmark.innerHTML = '';
          for (var i = 0; i < text.length; i++) {
            var span = document.createElement('span');
            span.className = 'char';
            span.textContent = text[i];
            span.style.animationDelay = (i * .05) + 's';
            wordmark.appendChild(span);
          }

          if (reduceMotion) {
            markReady();
          } else {
            setTimeout(markReady, 3800);
          }
        });
      })();
    </script>
  </body>
</html>
